version: "2"

run:
  timeout: 10m

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - govet
    - ineffassign
    - loggercheck
    - misspell
    - nilerr
    - nilnesserr
    - nolintlint
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - spancheck
    - staticcheck
    - unconvert
    - unqueryvet
    - usestdlibvars
    - gosec
  settings:
    gosec:
      excludes:
        # NOTE(garrett):Bounded backoff uses non-crypto bit shifts; values are capped by caller.
        - G115
        # NOTE(garrett): Best-effort audit/logging paths and cleanup deferrals intentionally ignore errors.
        - G104
        # NOTE(garrett): String literals such as API error codes and env var names are not credentials.
        - G101
        # NOTE(garrett): math/rand/v2 is used only for bounded scheduling/backoff jitter, not security tokens.
        - G404
        # NOTE(garrett): Data directories and segment files use group-readable modes by design (queue, logs, dev DB).
        - G301
        - G302
        - G304
        - G306
  exclusions:
    paths:
      - api/gen/go
      - website
    rules:
      # NOTE(garrett): Tests use short-lived servers, example URLs, and intentional unchecked errors.
      - path: _test\.go$
        linters:
          - gosec

issues:
  max-same-issues: 50
