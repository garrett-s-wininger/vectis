apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectis-api-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: vectis
spec:
  volumes:
    - name: api-data
      persistentVolumeClaim:
        claimName: vectis-api-data
  containers:
    - name: api
      image: vectis-api:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
          hostPort: 8080
          protocol: TCP
      volumeMounts:
        - name: api-data
          mountPath: /data
    - name: queue
      image: vectis-queue:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8081
          protocol: TCP
    - name: registry
      image: vectis-registry:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8082
          protocol: TCP
    - name: worker
      image: vectis-worker:latest
      imagePullPolicy: Never