apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectis-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectis-queue-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectis-log-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vectis-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["127.0.0.1:9090"]
      - job_name: vectis-api
        static_configs:
          - targets: ["127.0.0.1:8080"]
        metrics_path: /metrics
        scheme: http
      - job_name: vectis-queue
        static_configs:
          - targets: ["127.0.0.1:9081"]
        metrics_path: /metrics
        scheme: http
      - job_name: vectis-worker
        static_configs:
          - targets: ["127.0.0.1:9082"]
        metrics_path: /metrics
        scheme: http
      - job_name: vectis-log
        static_configs:
          - targets: ["127.0.0.1:9083"]
        metrics_path: /metrics
        scheme: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vectis-grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        orgId: 1
        uid: vectis-prom
        url: http://127.0.0.1:9090
        isDefault: false
        editable: false
---
apiVersion: v1
kind: Pod
metadata:
  name: vectis
spec:
  volumes:
    - name: postgres-data
      persistentVolumeClaim:
        claimName: vectis-postgres-data
    - name: queue-data
      persistentVolumeClaim:
        claimName: vectis-queue-data
    - name: log-data
      persistentVolumeClaim:
        claimName: vectis-log-data
    - name: prometheus-config
      configMap:
        name: vectis-prometheus-config
    - name: prometheus-data
      emptyDir: {}
    - name: grafana-datasources
      configMap:
        name: vectis-grafana-datasources
# NOTE(garrett): Grafana dashboard ConfigMaps are generated by deploy/podman/generate-grafana-configmaps.py.
# Use Makefile deploy-podman or pass both YAML files to podman play kube.
    - name: grafana-dashboard-provider
      configMap:
        name: vectis-grafana-dashboard-provider
    - name: grafana-dashboards
      configMap:
        name: vectis-grafana-dashboards
    - name: grafana-data
      emptyDir: {}
  containers:
    - name: postgres
      image: docker.io/library/postgres:18-alpine
      imagePullPolicy: IfNotPresent
      env: &postgresEnv
        - name: POSTGRES_USER
          value: vectis
        - name: POSTGRES_PASSWORD
          value: vectis
        - name: POSTGRES_DB
          value: vectis
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      ports:
        - containerPort: 5432
          hostPort: 15432
          protocol: TCP
    - name: api
      image: vectis-api:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
          hostPort: 8080
          protocol: TCP
      env: &dbEnv
        - name: VECTIS_DATABASE_DRIVER
          value: pgx
        - name: VECTIS_DATABASE_DSN
          value: postgres://vectis:vectis@127.0.0.1:5432/vectis?sslmode=disable
    - name: cron
      image: vectis-cron:latest
      imagePullPolicy: Never
      env: *dbEnv
    - name: log
      image: vectis-log:latest
      imagePullPolicy: Never
      env:
        - name: VECTIS_DATABASE_DRIVER
          value: pgx
        - name: VECTIS_DATABASE_DSN
          value: postgres://vectis:vectis@127.0.0.1:5432/vectis?sslmode=disable
        - name: XDG_DATA_HOME
          value: /data
        - name: VECTIS_LOG_STORAGE_DIR
          value: /data/vectis/jobs
      volumeMounts:
        - name: log-data
          mountPath: /data
      ports:
        - containerPort: 8083
          protocol: TCP
        - containerPort: 8084
          hostPort: 8084
          protocol: TCP
        - containerPort: 9083
          protocol: TCP
    - name: queue
      image: vectis-queue:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8081
          protocol: TCP
        - containerPort: 9081
          protocol: TCP
      env: &queueEnv
        - name: XDG_DATA_HOME
          value: /data
        - name: VECTIS_QUEUE_PERSISTENCE_DIR
          value: /data/vectis/queue
      volumeMounts:
        - name: queue-data
          mountPath: /data
    - name: reconciler
      image: vectis-reconciler:latest
      imagePullPolicy: Never
      env: *dbEnv
    - name: registry
      image: vectis-registry:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8082
          protocol: TCP
    - name: worker
      image: vectis-worker:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 9082
          protocol: TCP
      env: *dbEnv
    - name: prometheus
      image: docker.io/prom/prometheus:v3.11.0-distroless
      imagePullPolicy: IfNotPresent
      args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.enable-lifecycle
        - --storage.tsdb.retention.time=24h
      ports:
        - containerPort: 9090
          hostPort: 9090
          protocol: TCP
      volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-data
          mountPath: /prometheus
    - name: grafana
      image: docker.io/grafana/grafana:13.0.0-23943897787
      imagePullPolicy: IfNotPresent
      env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "false"
        - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
          value: /var/lib/grafana/dashboards/vectis-overview.json
      ports:
        - containerPort: 3000
          hostPort: 3000
          protocol: TCP
      volumeMounts:
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboard-provider
          mountPath: /etc/grafana/provisioning/dashboards
        - name: grafana-data
          mountPath: /var/lib/grafana
        - name: grafana-dashboards
          mountPath: /var/lib/grafana/dashboards
