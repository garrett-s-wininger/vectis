apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectis-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectis-queue-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectis-log-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: vectis
spec:
  volumes:
    - name: postgres-data
      persistentVolumeClaim:
        claimName: vectis-postgres-data
    - name: queue-data
      persistentVolumeClaim:
        claimName: vectis-queue-data
    - name: log-data
      persistentVolumeClaim:
        claimName: vectis-log-data
  containers:
    - name: postgres
      image: docker.io/library/postgres:18-alpine
      imagePullPolicy: IfNotPresent
      env: &postgresEnv
        - name: POSTGRES_USER
          value: vectis
        - name: POSTGRES_PASSWORD
          value: vectis
        - name: POSTGRES_DB
          value: vectis
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      ports:
        - containerPort: 5432
          hostPort: 15432
          protocol: TCP
    - name: api
      image: vectis-api:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
          hostPort: 8080
          protocol: TCP
      env: &dbEnv
        - name: VECTIS_DATABASE_DRIVER
          value: pgx
        - name: VECTIS_DATABASE_DSN
          value: postgres://vectis:vectis@127.0.0.1:5432/vectis?sslmode=disable
    - name: cron
      image: vectis-cron:latest
      imagePullPolicy: Never
      env: *dbEnv
    - name: log
      image: vectis-log:latest
      imagePullPolicy: Never
      env:
        - name: VECTIS_DATABASE_DRIVER
          value: pgx
        - name: VECTIS_DATABASE_DSN
          value: postgres://vectis:vectis@127.0.0.1:5432/vectis?sslmode=disable
        - name: XDG_DATA_HOME
          value: /data
        - name: VECTIS_LOG_STORAGE_DIR
          value: /data/vectis/jobs
      volumeMounts:
        - name: log-data
          mountPath: /data
      ports:
        - containerPort: 8083
          protocol: TCP
        - containerPort: 8084
          hostPort: 8084
          protocol: TCP
    - name: queue
      image: vectis-queue:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8081
          protocol: TCP
      env: &queueEnv
        - name: XDG_DATA_HOME
          value: /data
        - name: VECTIS_QUEUE_PERSISTENCE_DIR
          value: /data/vectis/queue
      volumeMounts:
        - name: queue-data
          mountPath: /data
    - name: reconciler
      image: vectis-reconciler:latest
      imagePullPolicy: Never
      env: *dbEnv
    - name: registry
      image: vectis-registry:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8082
          protocol: TCP
    - name: worker
      image: vectis-worker:latest
      imagePullPolicy: Never
      env: *dbEnv
