apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectis-postgres-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectis-queue-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectis-log-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vectis-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["127.0.0.1:9090"]
      - job_name: vectis-api
        static_configs:
          - targets: ["127.0.0.1:8080"]
        metrics_path: /metrics
        scheme: http
      - job_name: vectis-queue
        scheme: https
        metrics_path: /metrics
        tls_config:
          ca_file: /run/vectis/grpc-tls/ca.pem
        static_configs:
          - targets: ["127.0.0.1:9081"]
      - job_name: vectis-worker
        scheme: https
        metrics_path: /metrics
        tls_config:
          ca_file: /run/vectis/grpc-tls/ca.pem
        static_configs:
          - targets: ["127.0.0.1:9082"]
      - job_name: vectis-log
        scheme: https
        metrics_path: /metrics
        tls_config:
          ca_file: /run/vectis/grpc-tls/ca.pem
        static_configs:
          - targets: ["127.0.0.1:9083"]
      - job_name: vectis-reconciler
        scheme: https
        metrics_path: /metrics
        tls_config:
          ca_file: /run/vectis/grpc-tls/ca.pem
        static_configs:
          - targets: ["127.0.0.1:9085"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vectis-grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        orgId: 1
        uid: vectis-prom
        url: http://127.0.0.1:9090
        isDefault: false
        editable: false
      - name: OpenSearch Logs
        type: elasticsearch
        access: proxy
        orgId: 1
        uid: vectis-logs
        url: http://127.0.0.1:9200
        database: '[vectis-logs-]YYYY.MM.DD'
        isDefault: false
        editable: false
        jsonData:
          esVersion: 7.10.0
          interval: Daily
          logLevelField: level
          logMessageField: msg
          timeField: ts
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vectis-grpc-tls-env
data:
  VECTIS_GRPC_TLS_INSECURE: "false"
  VECTIS_GRPC_TLS_CA_FILE: /run/vectis/grpc-tls/ca.pem
  VECTIS_GRPC_TLS_CERT_FILE: /run/vectis/grpc-tls/server.pem
  VECTIS_GRPC_TLS_KEY_FILE: /run/vectis/grpc-tls/server-key.pem
  VECTIS_GRPC_TLS_SERVER_NAME: localhost
  VECTIS_METRICS_TLS_INSECURE: "false"
  VECTIS_METRICS_TLS_CERT_FILE: /run/vectis/grpc-tls/server.pem
  VECTIS_METRICS_TLS_KEY_FILE: /run/vectis/grpc-tls/server-key.pem
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vectis-tracing-env
data:
  OTEL_TRACES_EXPORTER: otlp
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
  OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:4318
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vectis-logging-env
data:
  VECTIS_LOG_FORMAT: json
  VECTIS_LOG_DIR: /var/log/vectis/components
  VECTIS_API_SERVER_LOG_FORMAT: json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vectis-fluent-bit-config
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Log_Level    info
        Parsers_File /fluent-bit/etc/parsers.conf

    [INPUT]
        Name              tail
        Path              /var/log/vectis/components/*.jsonl
        Tag               vectis.component
        Parser            vectis_json
        Path_Key          log_file
        Refresh_Interval  5
        Rotate_Wait       30
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

    [OUTPUT]
        Name                  opensearch
        Match                 vectis.*
        Host                  127.0.0.1
        Port                  9200
        Logstash_Format       On
        Logstash_Prefix       vectis-logs
        Suppress_Type_Name    On
        Replace_Dots          On
        Generate_ID           On
        Retry_Limit           False
  parsers.conf: |
    [PARSER]
        Name          vectis_json
        Format        json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vectis-jaeger-collector-config
data:
  config.yaml: |
    extensions:
      jaeger_storage:
        backends:
          trace_storage:
            elasticsearch:
              server_urls:
                - http://127.0.0.1:9200
      healthcheckv2:
        use_v2: true
        http:
          endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      jaeger_storage_exporter:
        trace_storage: trace_storage
    service:
      extensions: [jaeger_storage, healthcheckv2]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [jaeger_storage_exporter]
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 18888
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vectis-jaeger-query-config
data:
  config.yaml: |
    receivers:
      nop: {}
    exporters:
      nop: {}
    extensions:
      jaeger_storage:
        backends:
          trace_storage:
            elasticsearch:
              server_urls:
                - http://127.0.0.1:9200
      jaeger_query:
        storage:
          traces: trace_storage
      healthcheckv2:
        use_v2: true
        http:
          endpoint: 0.0.0.0:13134
    service:
      extensions: [jaeger_storage, jaeger_query, healthcheckv2]
      pipelines:
        traces:
          receivers: [nop]
          exporters: [nop]
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 18889
---
apiVersion: v1
kind: Pod
metadata:
  name: vectis
spec:
  volumes:
    - name: postgres-data
      persistentVolumeClaim:
        claimName: vectis-postgres-data
    - name: queue-data
      persistentVolumeClaim:
        claimName: vectis-queue-data
    - name: log-data
      persistentVolumeClaim:
        claimName: vectis-log-data
    - name: prometheus-config
      configMap:
        name: vectis-prometheus-config
    - name: prometheus-data
      emptyDir: {}
    - name: grafana-datasources
      configMap:
        name: vectis-grafana-datasources
# NOTE(garrett): Grafana dashboard ConfigMaps are generated by deploy/podman/generate-grafana-configmaps.py.
# Use Makefile deploy-podman or pass both YAML files to podman play kube.
    - name: grafana-dashboard-provider
      configMap:
        name: vectis-grafana-dashboard-provider
    - name: grafana-dashboards
      configMap:
        name: vectis-grafana-dashboards
    - name: grafana-data
      emptyDir: {}
    - name: vectis-grpc-tls
      emptyDir: {}
    - name: vectis-postgres-tls
      emptyDir: {}
    - name: jaeger-collector-config
      configMap:
        name: vectis-jaeger-collector-config
    - name: jaeger-query-config
      configMap:
        name: vectis-jaeger-query-config
    - name: observability-search-data
      emptyDir: {}
    - name: component-logs
      emptyDir: {}
    - name: fluent-bit-config
      configMap:
        name: vectis-fluent-bit-config
  initContainers:
    - name: vectis-pod-tls-init
      image: docker.io/library/alpine:3.21
      command:
        - /bin/sh
        - -c
        - |
          set -e
          apk add --no-cache openssl
          GRPC=/grpc-out
          PG=/pg-tls-out
          openssl genrsa -out "$GRPC/ca-key.pem" 4096
          openssl req -new -x509 -days 3650 -key "$GRPC/ca-key.pem" -out "$GRPC/ca.pem" -subj "/CN=vectis-pod-grpc-ca"
          openssl genrsa -out "$GRPC/server-key.pem" 2048
          openssl req -new -key "$GRPC/server-key.pem" -out /tmp/grpc.csr -subj "/CN=localhost"
          printf '%s\n' 'subjectAltName=DNS:localhost,IP:127.0.0.1' > /tmp/grpc-ext.cnf
          openssl x509 -req -in /tmp/grpc.csr -CA "$GRPC/ca.pem" -CAkey "$GRPC/ca-key.pem" -CAcreateserial -out "$GRPC/server.pem" -days 825 -extfile /tmp/grpc-ext.cnf
          chmod 644 "$GRPC/ca.pem" "$GRPC/server.pem"
          chmod 600 "$GRPC/ca-key.pem" "$GRPC/server-key.pem"
          openssl genrsa -out "$PG/ca-key.pem" 4096
          openssl req -new -x509 -days 3650 -key "$PG/ca-key.pem" -out "$PG/ca.pem" -subj "/CN=vectis-pod-postgres-ca"
          openssl genrsa -out "$PG/server-key.pem" 2048
          openssl req -new -key "$PG/server-key.pem" -out /tmp/pg.csr -subj "/CN=127.0.0.1"
          printf '%s\n' 'subjectAltName=DNS:localhost,IP:127.0.0.1' > /tmp/pg-ext.cnf
          openssl x509 -req -in /tmp/pg.csr -CA "$PG/ca.pem" -CAkey "$PG/ca-key.pem" -CAcreateserial -out "$PG/server.pem" -days 825 -extfile /tmp/pg-ext.cnf
          chmod 644 "$PG/ca.pem" "$PG/server.pem"
          chmod 600 "$PG/ca-key.pem" "$PG/server-key.pem"
          chown 70:70 "$PG/server.pem" "$PG/server-key.pem"
      volumeMounts:
        - name: vectis-grpc-tls
          mountPath: /grpc-out
        - name: vectis-postgres-tls
          mountPath: /pg-tls-out
  containers:
    - name: postgres
      image: docker.io/library/postgres:18-alpine
      imagePullPolicy: IfNotPresent
      args:
        - postgres
        - -c
        - ssl=on
        - -c
        - ssl_cert_file=/run/postgres-tls/server.pem
        - -c
        - ssl_key_file=/run/postgres-tls/server-key.pem
      env: &postgresEnv
        - name: POSTGRES_USER
          value: vectis
        - name: POSTGRES_PASSWORD
          value: vectis
        - name: POSTGRES_DB
          value: vectis
      volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: vectis-postgres-tls
          mountPath: /run/postgres-tls
          readOnly: true
      ports:
        - containerPort: 5432
          hostPort: 15432
          protocol: TCP
    - name: api
      image: vectis-api:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
          hostPort: 8080
          protocol: TCP
      envFrom: &vectisGrpcTlsEnvFrom
        - configMapRef:
            name: vectis-grpc-tls-env
        - configMapRef:
            name: vectis-tracing-env
        - configMapRef:
            name: vectis-logging-env
      volumeMounts: &vectisGrpcAndPostgresCaVolumeMounts
        - &grpcTlsMount
          name: vectis-grpc-tls
          mountPath: /run/vectis/grpc-tls
          readOnly: true
        - &postgresCaMount
          name: vectis-postgres-tls
          mountPath: /run/vectis/postgres-tls/ca.pem
          subPath: ca.pem
          readOnly: true
        - &componentLogsMount
          name: component-logs
          mountPath: /var/log/vectis/components
      env: &dbEnv
        - name: VECTIS_DATABASE_DRIVER
          value: pgx
        - name: VECTIS_DATABASE_DSN
          value: postgres://vectis:vectis@127.0.0.1:5432/vectis?sslmode=verify-full&sslrootcert=/run/vectis/postgres-tls/ca.pem
    - name: cron
      image: vectis-cron:latest
      imagePullPolicy: Never
      envFrom: *vectisGrpcTlsEnvFrom
      volumeMounts: *vectisGrpcAndPostgresCaVolumeMounts
      env: *dbEnv
    - name: log
      image: vectis-log:latest
      imagePullPolicy: Never
      envFrom: *vectisGrpcTlsEnvFrom
      volumeMounts:
        - <<: *grpcTlsMount
        - <<: *postgresCaMount
        - <<: *componentLogsMount
        - name: log-data
          mountPath: /data
      env:
        - name: VECTIS_DATABASE_DRIVER
          value: pgx
        - name: VECTIS_DATABASE_DSN
          value: postgres://vectis:vectis@127.0.0.1:5432/vectis?sslmode=verify-full&sslrootcert=/run/vectis/postgres-tls/ca.pem
        - name: XDG_DATA_HOME
          value: /data
        - name: VECTIS_LOG_STORAGE_DIR
          value: /data/vectis/jobs
      ports:
        - containerPort: 8083
          protocol: TCP
        - containerPort: 8084
          hostPort: 8084
          protocol: TCP
        - containerPort: 9083
          protocol: TCP
    - name: queue
      image: vectis-queue:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8081
          protocol: TCP
        - containerPort: 9081
          protocol: TCP
      envFrom: *vectisGrpcTlsEnvFrom
      env: &queueEnv
        - name: XDG_DATA_HOME
          value: /data
        - name: VECTIS_QUEUE_PERSISTENCE_DIR
          value: /data/vectis/queue
      volumeMounts:
        - <<: *grpcTlsMount
        - <<: *postgresCaMount
        - <<: *componentLogsMount
        - name: queue-data
          mountPath: /data
    - name: reconciler
      image: vectis-reconciler:latest
      imagePullPolicy: Never
      envFrom: *vectisGrpcTlsEnvFrom
      volumeMounts: *vectisGrpcAndPostgresCaVolumeMounts
      env:
        - name: VECTIS_DATABASE_DRIVER
          value: pgx
        - name: VECTIS_DATABASE_DSN
          value: postgres://vectis:vectis@127.0.0.1:5432/vectis?sslmode=verify-full&sslrootcert=/run/vectis/postgres-tls/ca.pem
    - name: registry
      image: vectis-registry:latest
      imagePullPolicy: Never
      envFrom: *vectisGrpcTlsEnvFrom
      volumeMounts: &vectisGrpcTlsOnlyVolumeMounts
        - *grpcTlsMount
        - *componentLogsMount
      ports:
        - containerPort: 8082
          protocol: TCP
    - name: worker
      image: vectis-worker:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 9082
          protocol: TCP
      envFrom: *vectisGrpcTlsEnvFrom
      volumeMounts: *vectisGrpcAndPostgresCaVolumeMounts
      env: *dbEnv
    - name: prometheus
      image: docker.io/prom/prometheus:v3.11.0-distroless
      imagePullPolicy: IfNotPresent
      args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.enable-lifecycle
        - --storage.tsdb.retention.time=24h
      ports:
        - containerPort: 9090
          hostPort: 9090
          protocol: TCP
      volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
        - name: prometheus-data
          mountPath: /prometheus
        - name: vectis-grpc-tls
          mountPath: /run/vectis/grpc-tls
          readOnly: true
    - name: observability-search
      image: docker.io/opensearchproject/opensearch:2.19.1
      imagePullPolicy: IfNotPresent
      env:
        - name: discovery.type
          value: single-node
        - name: plugins.security.disabled
          value: "true"
        - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          value: Fj9!qL2#zR7@pT4$uN6
        - name: OPENSEARCH_JAVA_OPTS
          value: -Xms512m -Xmx512m
      ports:
        - containerPort: 9200
          protocol: TCP
      volumeMounts:
        - name: observability-search-data
          mountPath: /usr/share/opensearch/data
    - name: fluent-bit
      image: docker.io/fluent/fluent-bit:5.0.4
      imagePullPolicy: IfNotPresent
      args:
        - --config=/fluent-bit/etc/fluent-bit.conf
      volumeMounts:
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc
          readOnly: true
        - name: component-logs
          mountPath: /var/log/vectis/components
          readOnly: true
    - name: jaeger-collector
      image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
      imagePullPolicy: IfNotPresent
      args:
        - --config
        - /jaeger/config.yaml
      ports:
        - containerPort: 4317
          protocol: TCP
        - containerPort: 4318
          protocol: TCP
      volumeMounts:
        - name: jaeger-collector-config
          mountPath: /jaeger
          readOnly: true
    - name: jaeger-query
      image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
      imagePullPolicy: IfNotPresent
      args:
        - --config
        - /jaeger/config.yaml
      ports:
        - containerPort: 16686
          hostPort: 16686
          protocol: TCP
      volumeMounts:
        - name: jaeger-query-config
          mountPath: /jaeger
          readOnly: true
    - name: opensearch-dashboards
      image: docker.io/opensearchproject/opensearch-dashboards:2.19.1
      imagePullPolicy: IfNotPresent
      env:
        - name: OPENSEARCH_HOSTS
          value: '["http://127.0.0.1:9200"]'
        - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
          value: "true"
      ports:
        - containerPort: 5601
          hostPort: 5601
          protocol: TCP
    - name: grafana
      image: docker.io/grafana/grafana:13.0.0-23943897787
      imagePullPolicy: IfNotPresent
      env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "false"
        - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
          value: /var/lib/grafana/dashboards/vectis-overview.json
      ports:
        - containerPort: 3000
          hostPort: 3000
          protocol: TCP
      volumeMounts:
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboard-provider
          mountPath: /etc/grafana/provisioning/dashboards
        - name: grafana-data
          mountPath: /var/lib/grafana
        - name: grafana-dashboards
          mountPath: /var/lib/grafana/dashboards
