[defaults]
maintainer = "Garrett Wininger <garrett.s.wininger@outlook.com>"
vendor = "Vectis"
homepage = "https://github.com/garrett-s-wininger/vectis"
license = "MIT"
section = "devel"
priority = "optional"

[[package]]
id = "vectis-cli"
name = "vectis-cli"
summary = "Command line client for Vectis"
description = """
Vectis CLI provides a one-shot command line client for Vectis APIs and operator
helpers.
"""
depends = ["ca-certificates"]

[[package.file]]
id = "vectis-cli"
source = "vectis-cli"
destination = "/usr/bin/vectis-cli"
mode = "0755"
owner = "root"
group = "root"

[[package]]
id = "vectis-services"
name = "vectis-services"
summary = "Standalone Vectis service stack"
description = """
Vectis services installs the long-running binaries and systemd artifacts for the
standalone Vectis service stack. Host-specific configuration remains owned by
operators and config management.
"""
depends = ["vectis-cli", "ca-certificates", "systemd"]

[[package.file]]
id = "vectis-api"
source = "vectis-api"
destination = "/usr/bin/vectis-api"
mode = "0755"
owner = "root"
group = "root"

[[package.file]]
id = "vectis-catalog"
source = "vectis-catalog"
destination = "/usr/bin/vectis-catalog"
mode = "0755"
owner = "root"
