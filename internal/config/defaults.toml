[api]
host = "localhost"
port = 8080

[queue]
port = 8081
register_with_registry = true

[registry]
port = 8082

[log]
host = "localhost"

[log.grpc]
port = 8083
register_with_registry = true

[log.sse]
port = 8084

[discovery]
registry_resolver_refresh = "10s"

[reconciler]
interval = "30s"

[database]
driver = "sqlite3"
dsn = "{{data_home}}/vectis/db.sqlite3"
