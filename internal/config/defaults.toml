[cell]
id = "local"

[api]
host = "localhost"
port = 8080
log_format = "text"
log.address = ""
cell_ingress.endpoints = []

[api.auth]
enabled = false
bootstrap_token = ""

[api.authz]
engine = "hierarchical_rbac"

[api.audit]
enabled = true
durability_overrides = ""

[api.tls]
cert_file = ""
key_file = ""
reload_interval = "0s"

[api.hsts]
max_age_seconds = 31536000
include_subdomains = false
preload = false

[api.session]
ttl = "168h"
idle_ttl = "24h"
cookie_secure = false
allow_insecure_cookies = false

[api.cache]
backend = "database"

[api.rate_limit]
auth_refill_rate = "12s"
auth_burst_size = 5
token_refill_rate = "3s"
token_burst_size = 20
general_refill_rate = "600ms"
general_burst_size = 150

[api.client_ip]
# When empty, client IP for rate limits and audit logs is always the TCP peer (RemoteAddr).
# When set to one or more CIDRs, a request whose peer address falls in any CIDR may use
# X-Forwarded-For (left-most valid IP), X-Real-IP, X-Forwarded-Proto, or
# Forwarded proto. Do not list broad ranges: 0.0.0.0/0 and ::/0 are rejected.
trusted_proxy_cidrs = []

[api.host_validation]
# Browser-facing API Host headers are limited to the listen host and loopback
# names by default. Configure exact external hosts when serving behind an ingress
# or binding to 0.0.0.0 for non-local access.
allowed_hosts = []

[api.cors]
# Browser cross-origin access is closed by default. Configure exact HTTPS origins
# for browser frontends; HTTP origins are accepted only for loopback/localhost
# development. Wildcard credentialed CORS is intentionally unsupported.
allowed_origins = []

[queue]
port = 8081
metrics_host = "localhost"
metrics_port = 9081
register_with_registry = true
advertise_address = ""

[orchestrator]
port = 8087
metrics_port = 9090
shards = 0
register_with_registry = true
advertise_address = ""

[registry]
port = 8082

[registry.cluster]
node_id = ""
advertise_address = ""
peer_addresses = []
gossip_interval = "2s"
anti_entropy_interval = "30s"
lease_ttl = "2m"
tombstone_ttl = "5m"
peer_dial_timeout = "3s"

[log]
host = "localhost"
metrics_host = "localhost"
metrics_port = 9083
max_run_buffers = 1024
storage_read_only_min_free_bytes = 1073741824

[log.grpc]
port = 8083
register_with_registry = true
advertise_address = ""

[artifact]
metrics_host = "localhost"
metrics_port = 9089
storage_read_only_min_free_bytes = 1073741824

[artifact.grpc]
port = 8086
register_with_registry = true
advertise_address = ""

[log_forwarder]
metrics_host = "localhost"
metrics_port = 9088

[secrets]
port = 8090
metrics_host = "localhost"
metrics_port = 9091
encryptedfs.root = ""
encryptedfs.key_file = ""

[secrets.policy]
allow = []

[discovery]
registry_resolver_refresh = "10s"
registry_resolver_poll_timeout = "5s"
registry_resolver_error_refresh = "2s"
registry_registration_refresh = "45s"
registry.addresses = []
orchestrator.address = ""

[dispatch]
start_ttl = "24h"

[cron]
claim_ttl = "5m"

[reconciler]
interval = "30s"
lease_ttl = "2m"
metrics_host = "localhost"
metrics_port = 9085

[catalog]
interval = "1s"
batch_size = 100
metrics_host = "localhost"
metrics_port = 9086

[cell_ingress]
host = "localhost"
port = 8085
metrics_host = "localhost"
metrics_port = 9087
repair_interval = "30s"
registry.address = ""
queue.address = ""

[service_identity]
registry_allowed_client_identities = []
queue_allowed_client_identities = []
log_allowed_client_identities = []
artifact_allowed_client_identities = []
orchestrator_allowed_client_identities = []
worker_control_allowed_client_identities = []
secrets_allowed_client_identities = []
cell_ingress_allowed_producer_identities = []

[action_registry]
local_roots = []
allowed_namespaces = []
allowed_sources = []
require_digest_pins = false

[database]
driver = "sqlite3"
dsn = "{{data_home}}/vectis/db.sqlite3"

[database.pgx_pool]
max_open_conns = 25
max_idle_conns = 10
conn_max_lifetime = "1h"
conn_max_idle_time = "15m"

[source]
checkout_root = "{{data_home}}/vectis/source-checkouts"

[worker]
metrics_host = "localhost"
metrics_port = 9082
register_with_registry = true
orchestrator.address = ""
secrets.address = "localhost:8090"
artifact_max_bytes = 1073741824
artifact_max_run_bytes = 10737418240
artifact_max_count = 1000

[worker.execution]
backend = "host"
workspace_root = ""

[worker.execution.lima]
path = "limactl"
instance = ""
guest_workspace_root = ""
start = false
preserve_env = false

[worker.control]
mode = "static"
port = 9084
port_min = 20000
port_max = 30000

[worker.execution_identity]
enabled = false
trust_domain = ""
path_template = "/cell/{cell}/namespace/{namespace}/job/{job}/run/{run}/execution/{execution}"

[worker.spiffe]
enabled = false
workload_api_address = ""
fetch_timeout = "5s"

[worker.spiffe.registration]
enabled = false
server_address = ""
parent_id = ""
selectors = []
x509_svid_ttl = "0s"
min_ttl = "0s"
max_ttl = "0s"

[grpc_tls]
insecure = true
ca_file = ""
cert_file = ""
key_file = ""
client_ca_file = ""
client_cert_file = ""
client_key_file = ""
server_name = ""
reload_interval = "0s"

[metrics_tls]
insecure = true
cert_file = ""
key_file = ""
reload_interval = "0s"
