[cell]
id = "local"

[api]
host = "localhost"
port = 8080
log_format = "text"
log.address = ""
cell_ingress.endpoints = []

[api.auth]
enabled = false
bootstrap_token = ""

[api.authz]
engine = "hierarchical_rbac"

[api.audit]
enabled = true
durability_overrides = ""

[api.rate_limit]
auth_refill_rate = "12s"
auth_burst_size = 5
token_refill_rate = "3s"
token_burst_size = 20
general_refill_rate = "600ms"
general_burst_size = 150

[api.client_ip]
# When empty, client IP for rate limits and audit logs is always the TCP peer (RemoteAddr).
# When set to one or more CIDRs, a request whose peer address falls in any CIDR may use
# X-Forwarded-For (left-most valid IP) or X-Real-IP instead. Do not list broad ranges:
# 0.0.0.0/0 and ::/0 are rejected.
trusted_proxy_cidrs = []

[queue]
port = 8081
metrics_port = 9081
register_with_registry = true
advertise_address = ""

[registry]
port = 8082

[registry.cluster]
node_id = ""
advertise_address = ""
peer_addresses = []
gossip_interval = "2s"
anti_entropy_interval = "30s"
lease_ttl = "2m"
tombstone_ttl = "5m"
peer_dial_timeout = "3s"

[log]
host = "localhost"
metrics_port = 9083
max_run_buffers = 1024

[log.grpc]
port = 8083
register_with_registry = true
advertise_address = ""

[discovery]
registry_resolver_refresh = "10s"
registry_resolver_poll_timeout = "5s"
registry_resolver_error_refresh = "2s"
registry_registration_refresh = "45s"
registry.addresses = []

[cron]
claim_ttl = "5m"

[reconciler]
interval = "30s"
lease_ttl = "2m"
metrics_port = 9085

[catalog]
interval = "1s"
batch_size = 100
metrics_port = 9086

[cell_ingress]
host = "localhost"
port = 8085
metrics_port = 9087
repair_interval = "30s"
registry.address = ""
queue.address = ""

[database]
driver = "sqlite3"
dsn = "{{data_home}}/vectis/db.sqlite3"

[database.pgx_pool]
max_open_conns = 25
max_idle_conns = 10
conn_max_lifetime = "1h"
conn_max_idle_time = "15m"

[worker]
metrics_port = 9082
register_with_registry = true

[worker.control]
mode = "static"
port = 9084
port_min = 20000
port_max = 30000

[grpc_tls]
insecure = true
ca_file = ""
cert_file = ""
key_file = ""
client_ca_file = ""
client_cert_file = ""
client_key_file = ""
server_name = ""
reload_interval = "0s"

[metrics_tls]
insecure = true
cert_file = ""
key_file = ""
reload_interval = "0s"
