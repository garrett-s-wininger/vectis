name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  ci-quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true
      - uses: arduino/setup-protoc@v3
        with:
          version: "34.x"
      - name: Install Go proto plugins
        run: |
          go install github.com/magefile/mage@v1.17.2
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
      - name: Install pre-commit
        run: python3 -m pip install --user pre-commit
      - name: Run Vectis dogfood gate
        run: mage ciQuick

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true
      - name: Run govulncheck
        run: make vulncheck

  website-a11y:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/website/node_modules/.cache/ms-playwright
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build site and run axe (Playwright)
        run: npm run test:a11y
        env:
          CI: true
