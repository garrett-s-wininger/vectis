edition = "2023";

import "common.proto";

option go_package = "vectis/api/gen/go;api";

message AckRequest {
    string delivery_id = 1;
}

message DeadLetterItem {
    string delivery_id = 1;
    common.JobRequest job_request = 2;
    int32 attempt_count = 3;
}

message ListDeadLetterResponse {
    repeated DeadLetterItem items = 1;
}

message DequeueRequest {
    repeated string supported_isolation = 1;
}

message RequeueDeadLetterRequest {
    string delivery_id = 1;
}

service QueueService {
    rpc Enqueue(common.JobRequest) returns (common.Empty);
    rpc Dequeue(DequeueRequest) returns (common.JobRequest);
    rpc TryDequeue(DequeueRequest) returns (common.JobRequest);
    rpc Ack(AckRequest) returns (common.Empty);
    rpc ListDeadLetter(common.Empty) returns (ListDeadLetterResponse);
    rpc RequeueDeadLetter(RequeueDeadLetterRequest) returns (common.Empty);
}
