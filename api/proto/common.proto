edition = "2023";

import "google/protobuf/timestamp.proto";

package common;

option go_package = "vectis/api/gen/go;api";

message Empty{}

message Job {
    string id = 1;
    string run_id = 2;
    Node root = 3;
    string delivery_id = 4;
    string default_isolation = 5;
    repeated SecretReference secrets = 6;
}

message JobRequest {
    Job job = 1;
    map<string, string> metadata = 2;
}

message Node {
    string id = 1;
    string uses = 2;
    map<string, string> with = 3;
    repeated Node steps = 4;
    map<string, NodePort> ports = 5;
    map<string, NodeInput> inputs = 6;
    string isolation = 7;
}

message NodePort {
    repeated Node nodes = 1;
}

message NodeInput {
    NodeOutputRef from = 1;
}

message NodeOutputRef {
    string node = 1;
    string output = 2;
}

enum SecretDeliveryType {
    SECRET_DELIVERY_TYPE_UNSPECIFIED = 0;
    SECRET_DELIVERY_TYPE_FILE        = 1;
}

message SecretDelivery {
    SecretDeliveryType type = 1;
    string path = 2;
}

message SecretReference {
    string id = 1;
    string ref = 2;
    SecretDelivery delivery = 3;
    repeated string task_keys = 4;
}

enum RunOutcome {
    RUN_OUTCOME_UNSPECIFIED = 0;
    RUN_OUTCOME_SUCCESS     = 1;
    RUN_OUTCOME_FAILURE     = 2;
    RUN_OUTCOME_UNKNOWN     = 3;
}

enum Stream {
    STREAM_STDOUT = 0;
    STREAM_STDERR = 1;
    STREAM_CONTROL = 2;
}

message LogChunk {
    string run_id = 1;
    bytes data = 2;
    int64 sequence = 3;
    Stream stream = 4;
    RunOutcome completed = 5;
    google.protobuf.Timestamp timestamp = 6;
    string log_shard_id = 7;
}
