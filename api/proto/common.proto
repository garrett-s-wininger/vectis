edition = "2023";

package common;

message Empty{}

message Job {
    string id = 1;
    repeated Step steps = 2;
}

message Step {
    string command = 1;
}

enum Stream {
    STREAM_STDOUT = 0;
    STREAM_STDERR = 1;
}

message LogChunk {
    string job_id = 1;
    bytes data = 2;
    int64 sequence = 3;
    Stream stream = 4;
}