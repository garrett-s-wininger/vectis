edition = "2023";

import "google/protobuf/timestamp.proto";

package common;

option go_package = "vectis/api/gen/go;api";

message Empty{}

message Job {
    string id = 1;
    string run_id = 2;
    Node root = 3;
    string delivery_id = 4;
}

message JobRequest {
    Job job = 1;
    map<string, string> metadata = 2;
}

message Node {
    string id = 1;
    string uses = 2;
    map<string, string> with = 3;
    repeated Node steps = 4;
}

enum RunOutcome {
    RUN_OUTCOME_UNSPECIFIED = 0;
    RUN_OUTCOME_SUCCESS     = 1;
    RUN_OUTCOME_FAILURE     = 2;
    RUN_OUTCOME_UNKNOWN     = 3;
}

enum Stream {
    STREAM_STDOUT = 0;
    STREAM_STDERR = 1;
    STREAM_CONTROL = 2;
}

message LogChunk {
    string run_id = 1;
    bytes data = 2;
    int64 sequence = 3;
    Stream stream = 4;
    RunOutcome completed = 5;
    google.protobuf.Timestamp timestamp = 6;
}
