edition = "2023";

package common;

message Empty{}

message Job {
    string id = 1;
    Node root = 2;
}

message Node {
    string id = 1;
    string uses = 2;
    map<string, string> with = 3;
    repeated Node steps = 4;
}

enum Stream {
    STREAM_STDOUT = 0;
    STREAM_STDERR = 1;
    STREAM_CONTROL = 2;
}

message LogChunk {
    string job_id = 1;
    bytes data = 2;
    int64 sequence = 3;
    Stream stream = 4;
}
