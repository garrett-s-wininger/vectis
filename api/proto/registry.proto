edition = "2023";

import "common.proto";

enum Component {
    COMPONENT_UNKNOWN = 0;
    COMPONENT_QUEUE = 1;
    COMPONENT_LOG = 2;
}

message Registration {
    Component component = 1;
    string address = 2;
}

message AddressRequest {
    Component component = 1;
}

message AddressResponse {
    string address = 1;
}

service RegistryService {
    rpc Register(Registration) returns (common.Empty);
    rpc GetAddress(AddressRequest) returns (AddressResponse);
}