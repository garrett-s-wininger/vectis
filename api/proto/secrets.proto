edition = "2023";

import "common.proto";

package secrets;

option go_package = "vectis/api/gen/go;api";

service SecretsService {
    rpc ResolveSecrets(ResolveSecretsRequest) returns (ResolveSecretsResponse);
}

message ResolveSecretsRequest {
    string run_id = 1;
    string execution_id = 2;
    string execution_claim_token = 3;
    repeated common.SecretReference secrets = 4;
}

message SecretFileMaterial {
    string id = 1;
    string path = 2;
    bytes data = 3;
    uint32 mode = 4;
}

message ResolveSecretsResponse {
    repeated SecretFileMaterial files = 1;
}
